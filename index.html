<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16a34a" />
    <title>fresh'n'fastkw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oleo+Script:wght@400;700&display=swap" rel="stylesheet">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('App Engine Online 🛡️');
            reg.update(); // Force Update the local cache
          }).catch(err => {
            console.log('App Engine Delay: ', err);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML = '<div style="color:red; padding:20px; font-family:monospace; background:white; z-index:9999; position:absolute; top:0; left:0; width:100%; height:100%;"><h1>Frontend Error:</h1><p>' + e.message + '</p><pre>' + (e.error ? e.error.stack : '') + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
